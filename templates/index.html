<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SortScope</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">

        <h1>SortScope</h1>

        <p class="subtitle">
            Compare Bubble Sort and Merge Sort Time Complexity
        </p>

        <div class="complexity-table">
            <h3>Algorithm Complexity Comparison</h3>

            <table>
                <tr>
                    <th>Algorithm</th>
                    <th>Best Case</th>
                    <th>Average Case</th>
                    <th>Worst Case</th>
                </tr>

                <tr>
                    <td>Bubble Sort</td>
                    <td>O(n)</td>
                    <td>O(n²)</td>
                    <td>O(n²)</td>
                </tr>

                <tr>
                    <td>Merge Sort</td>
                    <td>O(n log n)</td>
                    <td>O(n log n)</td>
                    <td>O(n log n)</td>
                </tr>
            </table>
        </div>

        <textarea
            id="numbers"
            placeholder="Enter numbers separated by commas
Example: 45,23,67,12,89,4">
        </textarea>

        <button onclick="analyzeSort()">
    Analyze Sorting Algorithms
</button>

<button class="reset-btn" onclick="resetFields()">
    Reset
</button>

<div id="result"></div>

        <div id="result"></div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
